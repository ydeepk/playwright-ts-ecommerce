# Playwright CI Pipeline for multi-stage test execution
# Covers:
# - PR validation (smoke)
# - Push validation (regression)
# - Scheduled runs (full suite)
# - Reporting + stakeholder notification
name: Playwright Test Pipeline (Full Optimized)

on:
  # Manual trigger for ad-hoc execution
  workflow_dispatch:

  # Run smoke tests on PRs targeting main branches
  pull_request:
    branches: [ main, master ]

  # Run regression suite on code push to main branches
  push:
    branches: [ main, master ]

  # Nightly execution for full regression coverage
  schedule:
    - cron: '0 2 * * *'

# Prevents parallel runs on same branch from overlapping
# Ensures resource efficiency and avoids report conflicts
concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

# ==========================================
# SMOKE TESTS (PR VALIDATION)
# ==========================================
  smoke-tests:
    # Executes only for pull request events
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    timeout-minutes: 30

    # Parallel shard execution to reduce runtime
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]

    steps:
      - uses: actions/checkout@v5

      # Sets Node.js runtime and enables npm caching
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      # Clean install ensures deterministic dependency resolution
      - run: npm ci

      # Cache Playwright browsers to reduce install time across runs
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # Installs required browsers and OS dependencies
      - run: npx playwright install --with-deps

      - name: Clean Allure Results
        run: rm -rf allure-results && mkdir allure-results

      - name: Run Smoke Tests
        run: |
          npx playwright test --retries=1 \
          --project=smoke-chromium \
          --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      
      - name: Copy Allure Categories
        if: always()
        run: cp issue-categories.json allure-results/

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: regression-allure-smoke-${{ matrix.shardIndex }}
          path: allure-results/

      - name: Validate Allure Results Before Upload
        run: |
          if [ ! -d "allure-results" ]; then
            echo "Allure results missing - failing job"
            exit 1
          fi
          
      # Upload Allure raw results for later aggregation
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: smoke-allure-${{ matrix.shardIndex }}
          path: allure-results/
          retention-days: 7

      # Upload Playwright HTML report for debugging
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report-smoke-${{ matrix.shardIndex }}
          path: playwright-report/
          retention-days: 7   
          
  generate-smoke-report:
    needs: [smoke-tests] # Replace with your actual smoke job name
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

    # 1. Pull the Smoke results specifically
      - name: Download Smoke shard results
        uses: actions/download-artifact@v4
        with:
          pattern: smoke-allure-*
          path: smoke-results
          merge-multiple: true

    # 2. Pull Smoke History (Crucial for the Trend)
      - name: Get Smoke History
        continue-on-error: true
        run: |
          # Adjust the path to where your smoke history is stored on gh-pages
          curl -O https://ydeepk.github.io/playwright-ts-ecommerce/smoke/history.tar.gz || true
          tar -xvf history.tar.gz -C smoke-results || true

    # 3. Build & Deploy
      - name: Build Smoke Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: smoke-results
          allure_history: allure-history
          subfolder: smoke # This keeps it separate from regression

# ==========================================
# REGRESSION TESTS (PUSH VALIDATION)
# ==========================================
  regression-tests:
    # Executes on direct pushes to main branches
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps

      - name: Clean Allure Results
        run: rm -rf allure-results && mkdir allure-results

      - name: Run Regression Tests
        run: |
          npx playwright test --retries=1 \
          --project=regression-chromium \
          --project=regression-firefox \
          --project=regression-webkit \
          --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Copy Allure Categories
        if: always()
        run: cp issue-categories.json allure-results/

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: regression-allure-regression-${{ matrix.shardIndex }}
          path: allure-results/

      - name: Validate Allure Results Before Upload
        run: |
          if [ ! -d "allure-results" ]; then
            echo "Allure results missing - failing job"
            exit 1
          fi

      # Stores Allure data for cross-shard merge
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: regression-allure-${{ matrix.shardIndex }}
          path: allure-results/
          retention-days: 7

      # Stores Playwright reports for debugging failures
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report-regression-${{ matrix.shardIndex }}
          path: playwright-report/
          retention-days: 7

  generate-report:
    needs: [regression-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Download ALL shard results
      - name: Download all shard results
        uses: actions/download-artifact@v4
        with:
          pattern: regression-allure-*
          path: all-results
          merge-multiple: true

      # 2. Get history from the previous deployment
      - name: Get Allure history
        continue-on-error: true
        run: |
          # Use curl to pull history from your live GitHub Pages site
          curl -O https://ydeepk.github.io/playwright-ts-ecommerce/history.tar.gz || true
          tar -xvf history.tar.gz -C all-results || true

      # 3. Build the report with history
      - name: Build Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: all-results
          allure_history: allure-history
          keep_reports: 20

      # 4. Deploy to GitHub Pages
      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history

# ==========================================
# NIGHTLY FULL SUITE
# ==========================================
  nightly-tests:
    # Executes on scheduled cron trigger only
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps

      - name: Clean Allure Results
        run: rm -rf allure-results && mkdir allure-results

      - name: Run Full Suite
        run: |
          npx playwright test --retries=1 \
          --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      
      - name: Copy Allure Categories
        if: always()
        run: cp issue-categories.json allure-results/

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: regression-allure-nightly-${{ matrix.shardIndex }}
          path: allure-results/
      
      - name: Validate Allure Results Before Upload
        run: |
          if [ ! -d "allure-results" ]; then
            echo "Allure results missing - failing job"
            exit 1
          fi

      # Stores Allure results for aggregation
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: nightly-allure-${{ matrix.shardIndex }}
          path: allure-results/
          retention-days: 7

      # Stores Playwright reports for debugging
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report-nightly-${{ matrix.shardIndex }}
          path: playwright-report/
          retention-days: 7
    
  generate-nightly-report:
    needs: [nightly-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Collect results from all nightly shards
      - name: Download Nightly results
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-allure-*
          path: nightly-results
          merge-multiple: true

      # 2. Extract previous history from the 'nightly' subfolder
      - name: Get Nightly History
        continue-on-error: true
        run: |
          # Fetching from your specific nightly path
          curl -O https://ydeepk.github.io/playwright-ts-ecommerce/nightly/history.tar.gz || true
          tar -xvf history.tar.gz -C nightly-results || true

      # 3. Build with the 'nightly' subfolder specified
      - name: Build Nightly Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: nightly-results
          allure_history: allure-history
          subfolder: nightly 
          keep_reports: 30 # Nightly history is usually kept longer for RCA


# ==========================================
# ALLURE MERGE + REPORT DEPLOYMENT
# ==========================================
  merge-report:
    runs-on: ubuntu-latest

    timeout-minutes: 15

    # Dynamically depend on the job that actually ran
    needs:
      - smoke-tests
      - regression-tests
      - nightly-tests

    # Ensures execution only if at least one upstream job was triggered
    if: >
      always() &&
      !cancelled() &&
      (
        needs.smoke-tests.result != 'skipped' ||
        needs.regression-tests.result != 'skipped' ||
        needs.nightly-tests.result != 'skipped'
      )

    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v5

      # ------------------------------------------
      # Downloads only existing artifacts
      # Avoids failure when some jobs are skipped
      # ------------------------------------------
      - name: Download all results
        uses: actions/download-artifact@v5
        with:
          pattern: "*-allure-*"
          path: all-results
          merge-multiple: true

      # ------------------------------------------
      # Defensive check → avoids empty report generation
      # Without this, Allure generates blank dashboard
      # ------------------------------------------
      - name: Validate Allure Results Exist
        run: |
          if [ ! -d "all-results" ] || [ -z "$(ls -A all-results)" ]; then
            echo "No Allure results found. Skipping report generation."
            exit 0
          fi

      # ------------------------------------------
      # Build Allure report with history retention
      # Enables trend analysis across runs
      # ------------------------------------------
      - name: Build Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: all-results
          gh_pages: gh-pages
          subfolder: allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 30

      # ------------------------------------------
      # Deploy only for non-PR events
      # PR deployments pollute gh-pages unnecessarily
      # ------------------------------------------
      - name: Deploy Report to Github Pages
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true

# ==========================================
# RESULT ANALYSIS + EMAIL NOTIFICATION
# ==========================================
  analyze-results:
    runs-on: ubuntu-latest

    timeout-minutes: 15

    # Runs after report generation
    needs: merge-report
    if: always()

    steps:
      - uses: actions/download-artifact@v5
        with:
          # Collect all Playwright JSON reports for aggregation
          pattern: "playwright-report-*"
          path: reports
          merge-multiple: true

      - name: Extract Detailed Metrics
        id: analysis
        run: |
          TOTAL=0
          PASSED=0
          FAILED=0
          SKIPPED=0
          
          FILES=$(find reports -name "report.json")

          if [ -z "$FILES" ]; then
            echo "JSON report not found - reporter misconfiguration or artifact issue"
            exit 1
          fi

          # Aggregates stats across all shards and jobs
          if [ -n "$FILES" ]; then
            for file in $FILES; do
              T=$(jq '.stats.expected + .stats.unexpected + .stats.skipped' "$file" || echo 0)
              F=$(jq '.stats.unexpected' "$file" || echo 0)
              S=$(jq '.stats.skipped' "$file" || echo 0)
              P=$((T - F - S))
              
              TOTAL=$((TOTAL + T))
              PASSED=$((PASSED + P))
              FAILED=$((FAILED + F))
              SKIPPED=$((SKIPPED + S))
            done
          fi

          # Fail fast if no valid test results found
          if [ "$TOTAL" -eq 0 ]; then
            echo "No test results found - possible JSON reporter misconfiguration"
            exit 1
          fi
          
          # Expose computed values to subsequent steps
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          
          # Determines overall execution status
          if [ "$FAILED" -eq 0 ] && [ "$TOTAL" -gt 0 ]; then
            echo "status=PASSED" >> $GITHUB_OUTPUT
            echo "color=#28a745" >> $GITHUB_OUTPUT
          else
            echo "status=FAILED" >> $GITHUB_OUTPUT
            echo "color=#dc3545" >> $GITHUB_OUTPUT
          fi

      - name: Send Stakeholder Email
        # Email notifications skipped for PRs to avoid noise
        if: github.event_name != 'pull_request'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          subject: QA Test Execution Report | ${{ steps.analysis.outputs.status }} | ${{ github.event_name }}

          to: yadavdeepak@outlook.com,kozonhq@gmail.com
          from: Playwright Automation Team

          # HTML email template for stakeholder-friendly reporting
          html_body: |
            <!-- Structured, readable summary for non-technical stakeholders -->
            <!-- Includes metrics, environment, and report link -->

            <!DOCTYPE html>
            <html>
            <head>
            <style>
            body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333; line-height: 1.6; margin: 0; padding: 0; }
            .container { max-width: 650px; margin: 20px auto; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
            .header { padding: 25px; text-align: center; color: white; }
            .status-passed { background-color: #28a745; }
            .status-failed { background-color: #dc3545; }
            .content { padding: 30px; }
            .metrics-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
            .metrics-table th, .metrics-table td { padding: 12px; border: 1px solid #eee; text-align: left; }
            .metrics-table th { background-color: #f8f9fa; color: #666; font-size: 12px; text-transform: uppercase; }
            .delta { font-size: 12px; font-weight: bold; }
            .delta-up { color: #dc3545; } /* Red for increasing failures */
            .delta-down { color: #28a745; }
            .cta-button { display: inline-block; padding: 15px 30px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 20px; }
            .footer { background-color: #f4f4f4; padding: 15px; text-align: center; font-size: 11px; color: #999; }
            </style>
            </head>
            <body>
            <div class="container">
            <div class="header ${STATUS_CLASS}">
            <h1 style="margin:0;">Automation Report: ${STATUS}</h1>
            <p style="margin:5px 0 0 0; opacity: 0.9;">Project: Playwright E-Commerce | Suite: ${TRIGGER_EVENT}</p>
            </div>

            <div class="content">
            <table style="width: 100%; margin-bottom: 20px;">
                <tr>
                    <td><strong>Environment:</strong> QA-Staging</td>
                    <td style="text-align: right;"><strong>Date:</strong> ${TIMESTAMP}</td>
                </tr>
                <tr>
                    <td><strong>Branch:</strong> ${BRANCH_NAME}</td>
                    <td style="text-align: right;"><strong>Duration:</strong> ${TOTAL_DURATION}</td>
                </tr>
            </table>

            <h3>📊 Test Performance Metrics</h3>
            <table class="metrics-table">
                <thead>
                    <tr>
                        <th>Metric</th>
                        <th>Current</th>
                        <th>Previous</th>
                        <th>Trend (Δ)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Total Tests</td>
                        <td><strong>${TOTAL}</strong></td>
                        <td>${PREV_TOTAL}</td>
                        <td>--</td>
                    </tr>
                    <tr>
                        <td>Passed</td>
                        <td style="color: #28a745; font-weight: bold;">${PASSED}</td>
                        <td>${PREV_PASSED}</td>
                        <td><span class="delta ${DELTA_P_CLASS}">${DELTA_PASSED}</span></td>
                    </tr>
                    <tr>
                        <td>Failed</td>
                        <td style="color: #dc3545; font-weight: bold;">${FAILED}</td>
                        <td>${PREV_FAILED}</td>
                        <td><span class="delta ${DELTA_F_CLASS}">${DELTA_FAILED}</span></td>
                    </tr>
                </tbody>
            </table>

            <h3>🔍 Top Failures (Immediate Attention)</h3>
            <ul style="padding-left: 20px; color: #555;">
                <li><strong>PIM Lifecycle:</strong> Timeout of 30000ms (Chromium/Firefox)</li>
                <li><strong>Checkout Flow:</strong> Element not interactable (Webkit)</li>
            </ul>

            <div style="text-align: center; margin-top: 40px;">
                <p style="font-size: 14px; color: #666;">For full traces, videos, and environment logs, visit the dashboard:</p>
                <a href="${ALLURE_URL}" class="cta-button">View Live Allure Report</a>
            </div>
            </div>

            <div class="footer">
            Generated by GitHub Actions Pipeline # ${RUN_ID} <br>
            © 2026 Quality Engineering Team
            </div>
            </div>
            </body>
            </html>