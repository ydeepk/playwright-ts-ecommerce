name: Playwright Test Pipeline (PR + Regression + Nightly)

on:
  workflow_dispatch:

  pull_request:
    branches: [ main, master ]

  push:
    branches: [ main, master ]

  schedule:
    - cron: '0 2 * * *'


jobs:

  # ==========================================
  # SMOKE TESTS (FAST FEEDBACK FOR PR)
  # ==========================================
  smoke-tests:
    name: Smoke Tests (PR Gate)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false   # PRO: ensures all shards run → better failure visibility
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'   # PRO: speeds up CI by caching dependencies

      - run: npm ci   # PRO: deterministic install (never use npm install in CI)

      - run: npx playwright install --with-deps

      - name: Run Smoke Tests
        run: |
          npx playwright test \
          --project=smoke-chromium \
          --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload Blob Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          # PRO: safe naming (no /), avoids artifact conflicts
          name: blob-smoke-${{ matrix.shardIndex }}-of-${{ matrix.shardTotal }}
          path: blob-report/
          retention-days: 7   # PRO: short retention → saves storage cost


  # ==========================================
  # MERGE SMOKE REPORTS (CRITICAL FOR DEBUGGING)
  # ==========================================
  merge-smoke:
    name: Merge Smoke Reports
    needs: smoke-tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports

      - name: Merge Playwright Reports
        run: |
          npx playwright merge-reports \
          --reporter html \
          ./all-blob-reports

      - name: Upload Final Report
        uses: actions/upload-artifact@v4
        with:
          name: merged-smoke-report
          path: playwright-report/


  # ==========================================
  # REGRESSION TESTS (POST-MERGE VALIDATION)
  # ==========================================
  regression-tests:
    name: Regression Suite
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps

      - name: Run Regression Tests
        run: |
          npx playwright test \
          --project=regression-chromium \
          --project=regression-firefox \
          --project=regression-webkit \
          --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload Blob Report
        uses: actions/upload-artifact@v4
        with:
          name: blob-regression-${{ matrix.shardIndex }}-of-${{ matrix.shardTotal }}
          path: blob-report/
          retention-days: 15


  # ==========================================
  # MERGE REGRESSION REPORTS
  # ==========================================
  merge-regression:
    name: Merge Regression Reports
    needs: regression-tests   # PRO: correct dependency (you had this wrong)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          path: all-blob-reports

      - run: |
          npx playwright merge-reports \
          --reporter html \
          ./all-blob-reports

      - uses: actions/upload-artifact@v4
        with:
          name: merged-regression-report
          path: playwright-report/


  # ==========================================
  # NIGHTLY FULL SUITE (EDGE + NEGATIVE)
  # ==========================================
  nightly-tests:
    name: Full Suite (Nightly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps

      - name: Run Full Suite
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload Blob Report
        uses: actions/upload-artifact@v4
        with:
          name: blob-nightly-${{ matrix.shardIndex }}-of-${{ matrix.shardTotal }}
          path: blob-report/
          retention-days: 30


  # ==========================================
  # MERGE NIGHTLY REPORTS
  # ==========================================
  merge-nightly:
    name: Merge Nightly Reports
    needs: nightly-tests
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          path: all-blob-reports

      - run: |
          npx playwright merge-reports \
          --reporter html \
          ./all-blob-reports

      - uses: actions/upload-artifact@v4
        with:
          name: merged-nightly-report
          path: playwright-report/