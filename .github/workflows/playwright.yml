name: Playwright Test Pipeline (Full Optimized)

on:
  workflow_dispatch:

  pull_request:
    branches: [ main, master ]

  push:
    branches: [ main, master ]

  schedule:
    - cron: '0 2 * * *'


# Prevent overlapping runs
concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true


jobs:

# ==========================================
# SMOKE TESTS (PR)
# ==========================================
  smoke-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Cache browsers (version aware)
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps

      - name: Run Smoke Tests
        run: |
          npx playwright test \
          --project=smoke-chromium \
          --project=smoke-firefox \
          --project=smoke-webkit \
          --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      # Allure results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-${{ matrix.shardIndex }}
          path: allure-results/

      # Playwright report (needed for failure + flaky parsing)
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-smoke-${{ matrix.shardIndex }}
          path: playwright-report/


# ==========================================
# REGRESSION TESTS (PUSH)
# ==========================================
  regression-tests:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps

      - name: Run Regression Tests
        run: |
          npx playwright test \
          --project=regression-chromium \
          --project=regression-firefox \
          --project=regression-webkit \
          --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-${{ matrix.shardIndex }}
          path: allure-results/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-regression-${{ matrix.shardIndex }}
          path: playwright-report/


# ==========================================
# NIGHTLY TESTS
# ==========================================
  nightly-tests:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps

      - name: Run Full Suite
        run: |
          npx playwright test \
          --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-${{ matrix.shardIndex }}
          path: allure-results/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-nightly-${{ matrix.shardIndex }}
          path: playwright-report/


# ==========================================
# MERGE + ALLURE (GENERIC)
# ==========================================
  merge-report:
    runs-on: ubuntu-latest
    needs: [smoke-tests, regression-tests, nightly-tests]
    if: always()

    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4

      # Download all artifacts
      - uses: actions/download-artifact@v4
        with:
          path: merged-results
          merge-multiple: true

      # Allure history
      - uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: merged-results
          allure_history: gh-pages/allure-history
          keep_reports: 20

      # Deploy only for push/schedule
      - name: Deploy Report
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history


# ==========================================
# FAILURE SUMMARY + FLAKY DETECTION
# ==========================================
  analyze-results:
    runs-on: ubuntu-latest
    needs: merge-report
    if: always()

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: reports

      # ✅ Extract failures + flaky signals
      - name: Analyze Playwright Results
        id: analysis
        run: |
          FAIL_COUNT=0
          FLAKY_COUNT=0

          # Look into all playwright JSON reports
          FILES=$(find reports -name "report.json" || true)

          for file in $FILES; do
            FAIL_COUNT=$((FAIL_COUNT + $(jq '[.suites[].specs[].tests[] | select(.status=="failed")] | length' $file)))
            FLAKY_COUNT=$((FLAKY_COUNT + $(jq '[.suites[].specs[].tests[] | select(.status=="flaky")] | length' $file)))
          done

          echo "failures=$FAIL_COUNT" >> $GITHUB_OUTPUT
          echo "flaky=$FLAKY_COUNT" >> $GITHUB_OUTPUT