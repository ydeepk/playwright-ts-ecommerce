name: Playwright Test Pipeline (Full Optimized)

on:
  workflow_dispatch:

  pull_request:
    branches: [ main, master ]

  push:
    branches: [ main, master ]

  schedule:
    - cron: '0 2 * * *'


# Prevent overlapping runs
concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true


jobs:

# ==========================================
# SMOKE TESTS (PR)
# ==========================================
  smoke-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Cache browsers (version aware)
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps

      - name: Run Smoke Tests
        run: |
          npx playwright test \
          --project=smoke-chromium \
          --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      # Allure results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-${{ matrix.shardIndex }}
          path: allure-results/

      # Playwright report (needed for failure + flaky parsing)
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-smoke-${{ matrix.shardIndex }}
          path: playwright-report/


# ==========================================
# REGRESSION TESTS (PUSH)
# ==========================================
  regression-tests:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps

      - name: Run Regression Tests
        run: |
          npx playwright test \
          --project=regression-chromium \
          --project=regression-firefox \
          --project=regression-webkit \
          --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-${{ matrix.shardIndex }}
          path: allure-results/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-regression-${{ matrix.shardIndex }}
          path: playwright-report/


# ==========================================
# NIGHTLY TESTS
# ==========================================
  nightly-tests:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps

      - name: Run Full Suite
        run: |
          npx playwright test \
          --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-${{ matrix.shardIndex }}
          path: allure-results/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-nightly-${{ matrix.shardIndex }}
          path: playwright-report/


# ==========================================
# MERGE + ALLURE (GENERIC)
# ==========================================
  merge-report:
    runs-on: ubuntu-latest
    # Change: Use 'if: always()' but check that at least one test job finished
    needs: [smoke-tests, regression-tests, nightly-tests]
    if: always() && !cancelled() 

    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          # This will download ALL results from whichever job ran
          path: all-results
          merge-multiple: true

      - name: Get Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: allure-history # Checkout directly to expected history folder

      - name: Build Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: all-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy Report to Github Pages
        # Only deploy for master/main branch runs
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history


# ==========================================
# FAILURE SUMMARY + FLAKY DETECTION
# ==========================================
  analyze-results:
    runs-on: ubuntu-latest
    needs: merge-report
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Analyze Playwright Results
        id: analysis
        run: |
          FAIL_COUNT=0
          # Logic to find report.json and count failures
          FILES=$(find reports -name "report.json" || true)
          for file in $FILES; do
            FAIL_COUNT=$((FAIL_COUNT + $(jq '[.suites[].specs[].tests[] | select(.status=="failed")] | length' $file)))
          done
          echo "failures=$FAIL_COUNT" >> $GITHUB_OUTPUT
          
          # Set Status Color
          if [ "$FAIL_COUNT" -eq "0" ]; then
            echo "status=PASSED" >> $GITHUB_OUTPUT
            echo "color=#28a745" >> $GITHUB_OUTPUT
          else
            echo "status=FAILED" >> $GITHUB_OUTPUT
            echo "color=#dc3545" >> $GITHUB_OUTPUT
          fi

      - name: Send Stakeholder Email
        # Only send for Push (Regression) or Schedule (Nightly)
        if: github.event_name != 'pull_request' 
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: |
            QA Automation Report: ${{ steps.analysis.outputs.status }} - ${{ github.event_name }}
          to: yadavdeepak@outlook.com,kozonhq@mgmail.com
          from: Playwright Automation Team
          html_body: |
            <div style="font-family: Arial, sans-serif; padding: 20px; border: 1px solid #eee;">
              <h2 style="color: ${{ steps.analysis.outputs.color }};">Test Run: ${{ steps.analysis.outputs.status }}</h2>
              <p><strong>Environment:</strong> QA-Staging</p>
              <p><strong>Total Failures:</strong> ${{ steps.analysis.outputs.failures }}</p>
              <hr />
              <p>Detailed Allure Report and Trends can be found here:</p>
              <a href="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" 
                 style="background-color: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">
                 View Full Allure Dashboard
              </a>
              <br><br>
              <p><em>This is an automated message from the GitHub Actions Pipeline.</em></p>
            </div>