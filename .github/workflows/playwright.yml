name: Playwright Test Pipeline (PR + Regression + Nightly)

on:
  # PR → fast feedback before merge
  pull_request:
    branches: [ main, master ]

  # Push → validate integration after merge
  push:
    branches: [ main, master ]

  # Nightly → deep validation outside dev workflow
  schedule:
    - cron: '0 2 * * *'

jobs:

  # ==========================
  # PR JOB → SMOKE (FAST)
  # ==========================
  smoke-tests:
    name: Smoke Tests (PR Gate)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]   # Faster PR feedback

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps

      # Runs ONLY smoke project (defined in config)
      # No grep → config controls test selection
      - name: Run Smoke Tests
        run: npx playwright test --project=smoke-chromium --shard=${{ matrix.shard }}

      - name: Upload Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 15


  # ==========================
  # MAIN JOB → REGRESSION
  # ==========================
  regression-tests:
    name: Regression Suite (Post-Merge)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps

      # Runs regression projects across browsers
      # Config handles tagging via grep
      - name: Run Regression Tests
        run: |
          npx playwright test \
            --project=regression-chromium \
            --project=regression-firefox \
            --project=regression-webkit \
            --shard=${{ matrix.shard }}

      - name: Upload Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 30


  # ==========================
  # NIGHTLY JOB → FULL SUITE
  # ==========================
  nightly-tests:
    name: Full Suite (Nightly - Edge + Negative)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps

      # Runs ALL projects (smoke + regression + future edge/negative)
      # No filtering → full coverage
      - name: Run Full Test Suite
        run: npx playwright test --shard=${{ matrix.shard }}

      - name: Upload Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-report-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 30