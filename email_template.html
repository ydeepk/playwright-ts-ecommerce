<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #333333; line-height: 1.5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; border: 1px solid #e1e4e8; border-radius: 6px; overflow: hidden; }
        .banner { padding: 20px; text-align: center; color: #ffffff; font-size: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        /* Fallbacks if sed mapping introduces issues */
        .banner.FAILED, .banner.failed { background-color: #dc3545; }
        .banner.PASSED, .banner.passed { background-color: #28a745; }
        .content { padding: 24px; background-color: #ffffff; }
        .project-title { font-size: 18px; font-weight: 600; margin-top: 0; margin-bottom: 4px; color: #1f2328; }
        .project-env { font-size: 14px; color: #57606a; margin-bottom: 20px; }
        .meta-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; font-size: 14px; }
        .meta-table td { padding: 6px 0; vertical-align: top; }
        .meta-label { color: #57606a; width: 35%; font-weight: 500; }
        .meta-value { color: #1f2328; width: 65%; }
        .btn-container { text-align: center; margin: 28px 0 10px 0; }
        .btn { background-color: #0969da; color: #ffffff !important; text-decoration: none; padding: 12px 24px; font-size: 14px; font-weight: 600; border-radius: 6px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <!-- The class dynamically becomes "banner PASSED" or "banner FAILED" matching your CSS -->
    <div class="banner ${STATUS}">
        Automation Run: ${STATUS}
    </div>
    
    <div class="content">
        <div class="project-title">Playwright E-Commerce Engine</div>
        <div class="project-env">Environment: <strong>QA / Staging</strong></div>
        
        <table class="meta-table">
            <tr>
                <td class="meta-label">Executed At</td>
                <td class="meta-value">${TIMESTAMP}</td>
            </tr>
            <tr>
                <td class="meta-label">CI Run ID</td>
                <td class="meta-value"><code>${RUN_ID}</code></td>
            </tr>
            <tr>
                <td class="meta-label">Total Cases</td>
                <td class="meta-value">${TOTAL}</td>
            </tr>
            <tr>
                <td class="meta-label">Passed</td>
                <td class="meta-value" style="color: #28a745; font-weight: bold;">${PASSED}</td>
            </tr>
            <tr>
                <td class="meta-label">Failed / Timeouts</td>
                <td class="meta-value" style="color: #dc3545; font-weight: bold;">${FAILED}</td>
            </tr>
        </table>

        <div class="btn-container">
            <a href="https://ydeepk.github.io/playwright-ts-ecommerce/" class="btn" target="_blank">Open Interactive Allure Dashboard</a>
        </div>
    </div>
</div>

</body>
</html>
